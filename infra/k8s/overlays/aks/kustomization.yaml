apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: aerostream-aks
patches:
  - target:
      kind: Namespace
      name: aerostream
    patch: |-
      - op: replace
        path: /metadata/name
        value: aerostream-aks
  - target:
      kind: ConfigMap
      name: platform-config
    patch: |-
      - op: replace
        path: /data/ENVIRONMENT
        value: aks
      - op: replace
        path: /data/CLUSTER_PROFILE
        value: aks-managed
  - target:
      kind: Ingress
      name: aerostream
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: azure-application-gateway
      - op: add
        path: /metadata/annotations/kubernetes.io~1ingress.class
        value: azure/application-gateway
      - op: add
        path: /metadata/annotations/appgw.ingress.kubernetes.io~1request-timeout
        value: "60"
      - op: add
        path: /metadata/annotations/appgw.ingress.kubernetes.io~1ssl-redirect
        value: "false"
      - op: replace
        path: /spec/rules/0/host
        value: aerostream.aks.local
