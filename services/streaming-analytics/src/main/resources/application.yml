server:
  port: 8086

spring:
  application:
    name: streaming-analytics

  kafka:
    bootstrap-servers: kafka:9092
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://schema-registry:8081}
      specific.avro.reader: false
    consumer:
      group-id: streaming-analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer

  datasource:
    url: jdbc:postgresql://postgres:5432/aerostream
    username: aerostream
    password: aerostream

  jpa:
    hibernate:
      ddl-auto: update

  data:
    mongodb:
      uri: mongodb://mongo:27017/aerostream

aerostream:
  kafka:
    topic: flight-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
