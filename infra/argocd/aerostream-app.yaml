apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aerostream-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/manojpasunoori/AeroStream-Real-Time-Airline-Operations-Intelligence-Platform.git
    targetRevision: main
    path: infra/helm/aerostream
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aerostream-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
