apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  labels:
    app: ingestion-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: ingestion-service
          image: ghcr.io/manojpasunoori/aerostream-ingestion-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SCHEMA_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: SCHEMA_REGISTRY_URL
            - name: INGESTION_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: INGESTION_TOPIC
            - name: FLIGHT_EVENT_SCHEMA_PATH
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FLIGHT_EVENT_SCHEMA_PATH
          volumeMounts:
            - name: flight-event-schema
              mountPath: /schemas/flight-event.avsc
              subPath: flight-event.avsc
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 25
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: flight-event-schema
          configMap:
            name: flight-event-schema
---
