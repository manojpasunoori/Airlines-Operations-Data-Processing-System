version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - airline-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
    networks:
      - airline-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    depends_on:
      - kafka
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - airline-net

  flight-simulator:
    build: ./services/flight-simulator
    container_name: flight-simulator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SIMULATOR_TOPIC: flight.events.v1
      SIMULATOR_INTERVAL_SECONDS: 1
    ports:
      - "8091:8091"
    depends_on:
      - kafka
    volumes:
      - ./schemas:/schemas:ro
    networks:
      - airline-net
  ingestion-service:
    build: ./services/ingestion-service
    container_name: ingestion-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INGESTION_TOPIC: flight-events
    ports:
      - "8090:8090"
    depends_on:
      - kafka
    volumes:
      - ./schemas:/schemas:ro
    networks:
      - airline-net
  streaming-analytics:
    build: ./services/streaming-analytics
    container_name: streaming-analytics
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: aerostream
      POSTGRES_USER: aerostream
      POSTGRES_PASSWORD: aerostream
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: aerostream
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8086:8086"
    depends_on:
      - kafka
      - postgres
      - mongo
    networks:
      - airline-net
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: aerostream
      POSTGRES_USER: aerostream
      POSTGRES_PASSWORD: aerostream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerostream -d aerostream"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - airline-net

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: aerostream
    volumes:
      - mongo_data:/data/db
    networks:
      - airline-net

  flight-service:
    build: ./services/flight-service
    container_name: flight-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airline-net

  crew-service:
    build: ./services/crew-service
    container_name: crew-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airline-net

  delay-service:
    build: ./services/delay-service
    container_name: delay-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airline-net

  kpi-service:
    build: ./services/kpi-service
    container_name: kpi-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airline-net

  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      API_KEY: ${API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8080:8080"
    depends_on:
      - flight-service
      - crew-service
      - delay-service
      - kpi-service
    networks:
      - airline-net

  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "5173:80"
    depends_on:
      - gateway
    networks:
      - airline-net
  otel-collector:
    image: otel/opentelemetry-collector:0.109.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"
    networks:
      - airline-net
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - airline-net
    depends_on:
      - gateway
      - flight-service
      - crew-service
      - delay-service
      - kpi-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - airline-net
    depends_on:
      - prometheus

networks:
  airline-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
